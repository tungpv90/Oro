name: oro_app
description: Oro - BLE animation device management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Networking
  dio: ^5.4.0

  # Bluetooth
  flutter_blue_plus: ^1.31.0

  # Media
  image_picker: ^1.0.0
  video_player: ^2.8.0

  # Storage
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # UI
  go_router: ^13.0.0
  cached_network_image: ^3.3.0
  percent_indicator: ^4.2.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
